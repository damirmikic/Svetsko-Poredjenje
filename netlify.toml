[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["node:http", "node:fs", "node:fs/promises", "node:path"]

[functions."odds"]
  timeout = 26

[[redirects]]
  from = "/api/odds"
  to = "/.netlify/functions/odds"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
